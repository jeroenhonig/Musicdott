name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies for vulnerabilities
        # Fails on critical vulnerabilities only. High-severity issues in transitive
        # dependencies of music notation libraries (opensheetmusicdisplay, ical-js-parser)
        # cannot be fixed without breaking changes — tracked separately.
        run: npm audit --audit-level=critical

      - name: Run release baseline checks
        run: npm run ci
